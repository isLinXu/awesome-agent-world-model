name: Update World Model Papers

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD). Empty = 7 days ago'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYY-MM-DD). Empty = today'
        required: false
        default: ''
      sources:
        description: 'Data sources (comma-separated: arxiv,huggingface,paperswithcode)'
        required: false
        default: 'arxiv,huggingface,paperswithcode'
  # 每天定时运行
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 00:00 运行

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  update:
    name: Update World Model Papers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Fetch new papers (multi-source)
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            START_DATE="${{ github.event.inputs.start_date }}"
          else
            START_DATE=$(date -u -d "7 days ago" +%Y-%m-%d)
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            END_DATE="${{ github.event.inputs.end_date }}"
          else
            END_DATE=$(date -u +%Y-%m-%d)
          fi
          # Determine sources (default: all three)
          SOURCES="${{ github.event.inputs.sources }}"
          if [ -z "$SOURCES" ]; then
            SOURCES="arxiv,huggingface,paperswithcode"
          fi
          echo "Fetching papers from: $START_DATE to $END_DATE"
          echo "Sources: $SOURCES"
          python scripts/auto_update.py \
            --start_date "$START_DATE" \
            --end_date "$END_DATE" \
            --sources "$SOURCES"

      - name: Update counts and metadata
        run: |
          python scripts/update_metadata.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto: daily paper update $(date -u +%Y-%m-%d) [multi-source]"
          git pull --rebase origin main
          git push origin HEAD:main
